services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: slaw
      POSTGRES_PASSWORD: slaw
      POSTGRES_DB: slaw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slaw -d slaw"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://slaw:slaw@db:5432/slaw
      PORT: "3100"
      SERVE_UI: "true"
      SLAW_DEPLOYMENT_MODE: "authenticated"
      SLAW_DEPLOYMENT_EXPOSURE: "private"
      SLAW_PUBLIC_URL: "${SLAW_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - slaw-data:/slaw
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  slaw-data:
